version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-scoring-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: aiscore
      POSTGRES_PASSWORD: aiscore_pass
      POSTGRES_DB: aiscore_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
